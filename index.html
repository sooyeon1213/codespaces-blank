<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video</title>
    <style>
        /* 화면 전체 높이를 확보하여 가운데 정렬을 준비합니다 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ADD8E6; /* 하늘색 */
            display: flex;
            flex-direction: column;
            align-items: center;     /* 가로 가운데 정렬 */
            justify-content: center;    /* 세로 가운데 정렬 */
            font-family: '맑은 고딕', sans-serif;
        }

        .video-container {
            text-align: center;
        }

        .video-title {
            color: white;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px; /* 제목과 동영상 사이의 간격 */
            text-shadow: 1px 1px 4px rgba(0,0,0,0.2); /* 흰 글씨가 잘 보이도록 그림자 효과 */
        }

        iframe {
            border: none;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.15); /* 동영상 테두리 부드러운 그림자 */
            border-radius: 8px; /* 모서리 살짝 둥글게 */
        }
    </style>
</head>
<body>

    <div class="video-container">
        <div class="video-title">포일고 체육대회</div>
        <iframe 
            width="560" 
            height="315" 
            src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
